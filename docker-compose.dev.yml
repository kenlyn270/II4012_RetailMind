services:
  postgres:
    image: postgres:16-alpine
    container_name: retailmind-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: retailmind
      POSTGRES_PASSWORD: retailmind
      POSTGRES_DB: retailmind
    volumes:
      - retailmind_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailmind -d retailmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  inference:
    build:
      context: .
      dockerfile: model/inference/Dockerfile
    container_name: retailmind-inference
    ports:
      - "8001:8000"
    environment:
      MODEL_PATH: /app/model/model/retail_ai_model_assets.joblib
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\""]
      interval: 15s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: retailmind-backend
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://retailmind:retailmind@postgres:5432/retailmind
      PG_POOL_MAX: 10
      INFERENCE_URL: http://inference:8000
    depends_on:
      postgres:
        condition: service_healthy
      inference:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: retailmind-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: http://backend:3001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    command: npm run dev -- --host 0.0.0.0

  ngrok:
    image: ngrok/ngrok:latest
    container_name: retailmind-ngrok
    profiles:
      - webhook
    env_file:
      - ./backend/.env
    depends_on:
      backend:
        condition: service_started
    command:
      - http
      - "http://backend:3001"
      - --log=stdout
    ports:
      # Ngrok local inspection UI: http://localhost:4040
      - "4040:4040"

volumes:
  retailmind_pg_data:
